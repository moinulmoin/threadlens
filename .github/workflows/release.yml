name: Release

# Final tag (e.g. v1.1.0) -> build + publish everywhere.
# Pre-release tag (e.g. v1.1.0-rc.1) or manual dispatch -> build + smoke + archive only
# (publish/release jobs are skipped). Use that as a full dry run before the real tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify wheel install
        run: |
          python -m pip install dist/*.whl
          threadlens --version
          threadlens skill --json
      - uses: actions/upload-artifact@v4
        with:
          name: threadlens-python-dist
          path: dist/*

  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
            uv_python: cpython-3.12-macos-aarch64
          - target: darwin-x64
            runner: macos-15 # arm64 runner builds x86_64 under Rosetta (macos-13 Intel runners are unavailable)
            uv_python: cpython-3.12-macos-x86_64
            rosetta: true
          - target: linux-x64-gnu
            runner: ubuntu-22.04 # oldest supported runner -> broadest glibc compatibility
            uv_python: cpython-3.12-linux-x86_64-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install Rosetta (run the x86_64 binary on the arm64 runner)
        if: matrix.rosetta
        run: sudo softwareupdate --install-rosetta --agree-to-license
      - name: Build onedir binary
        run: |
          uv venv --python ${{ matrix.uv_python }} .venv
          uv pip install --python .venv/bin/python pyinstaller .
          .venv/bin/pyinstaller packaging/threadlens.spec --distpath dist/bin --workpath build/pyi --noconfirm
      - name: Smoke + arch + latency
        run: |
          BIN="dist/bin/threadlens/threadlens"
          file "$BIN"
          "$BIN" --version
          "$BIN" skill --json
          .venv/bin/python - "$BIN" <<'PY'
          import subprocess, sys, time
          binv = sys.argv[1]
          ts = []
          for _ in range(5):
              t = time.perf_counter()
              subprocess.run([binv, "--version"], capture_output=True)
              ts.append((time.perf_counter() - t) * 1000)
          ts.sort()
          med = ts[len(ts) // 2]
          print(f"::notice::{binv} --version cold-start median {med:.0f}ms")
          assert med < 2000, f"binary cold-start regression: {med:.0f}ms"
          PY
      - name: Stage onedir bundle under a top-level threadlens/ dir
        run: |
          mkdir -p "stage/threadlens"
          cp -R dist/bin/threadlens/. "stage/threadlens/"
      - uses: actions/upload-artifact@v4
        with:
          name: threadlens-binary-${{ matrix.target }}
          path: stage/threadlens

  package-release-assets:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: threadlens-binary-*
      - name: Archive each platform + checksums
        run: |
          mkdir -p release
          for d in artifacts/threadlens-binary-*; do
            target="${d#artifacts/threadlens-binary-}"
            work="stage/${target}/threadlens"
            mkdir -p "$work"
            cp -R "$d/." "$work/"
            chmod +x "$work/threadlens" || true
            tar -C "stage/${target}" -czf "release/threadlens-${target}.tar.gz" threadlens
          done
          (cd release && shasum -a 256 *.tar.gz > SHA256SUMS)
          ls -la release
      - uses: actions/upload-artifact@v4
        with:
          name: threadlens-release-archives
          path: release/*

  publish-npm-platforms:
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted-publishing provenance once publishers are configured
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5.1
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: threadlens-binary-*
      - name: Assemble + publish platform packages (skip if already published)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node npm/scripts/sync.mjs
          for target in darwin-arm64 darwin-x64 linux-x64-gnu; do
            pkgdir="npm/platforms/threadlens-${target}"
            rm -rf "$pkgdir/bin/threadlens"
            mkdir -p "$pkgdir/bin/threadlens"
            cp -R "artifacts/threadlens-binary-${target}/." "$pkgdir/bin/threadlens/"
            chmod +x "$pkgdir/bin/threadlens/threadlens"
            name="$(node -p "require('./$pkgdir/package.json').name")"
            ver="$(node -p "require('./$pkgdir/package.json').version")"
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "${name}@${ver} already published, skipping"
            else
              (cd "$pkgdir" && npm publish --access public)
            fi
          done

  publish-npm-main:
    needs: publish-npm-platforms
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - name: Publish main package (skip if already published)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node npm/scripts/sync.mjs
          ver="$(node -p "require('./npm/package.json').version")"
          if npm view "threadlens@${ver}" version >/dev/null 2>&1; then
            echo "threadlens@${ver} already published, skipping"
          else
            (cd npm && npm publish --access public)
          fi

  publish-pypi:
    needs: build-python
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: threadlens-python-dist
          path: dist
      - name: Check if version already on PyPI
        id: check
        run: |
          version="$(ls dist/*.whl | sed -E 's/.*threadlens-([0-9][^-]*)-.*/\1/')"
          if curl -fsS "https://pypi.org/pypi/threadlens/$version/json" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to PyPI (trusted publishing)
        if: steps.check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [build-python, package-release-assets]
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: threadlens-python-dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: threadlens-release-archives
          path: release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            release/*

  raycast:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: raycast
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: raycast/package-lock.json
      - run: npm ci
      - run: npm run build

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify wheel install
        run: |
          python -m pip install dist/*.whl
          threadlens --version
          threadlens skill --json
      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: threadlens-python-dist
          path: dist/*

  publish-pypi:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download built distribution
        uses: actions/download-artifact@v4
        with:
          name: threadlens-python-dist
          path: dist
      - name: Check if version already on PyPI
        id: check
        run: |
          version="$(ls dist/*.whl | sed -E 's/.*threadlens-([0-9][^-]*)-.*/\1/')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if curl -fsS "https://pypi.org/pypi/threadlens/$version/json" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "threadlens $version already on PyPI, skipping publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to PyPI (trusted publishing)
        if: steps.check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Publish to npm if version is new
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node scripts/sync.mjs
          version="$(node -p "require('./package.json').version")"
          if npm view "threadlens@$version" version >/dev/null 2>&1; then
            echo "threadlens@$version already on npm, skipping publish"
          else
            npm publish --access public
          fi

  github-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built distribution
        uses: actions/download-artifact@v4
        with:
          name: threadlens-python-dist
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  raycast:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: raycast
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: raycast/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build Raycast extension
        run: npm run build
